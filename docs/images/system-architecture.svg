<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">GMAO — System Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#64748b">Layered monolith · 3-tier deployment · Up to 30 concurrent users</text>

  <!-- ===== USER ===== -->
  <g transform="translate(470, 80)">
    <circle cx="30" cy="18" r="11" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
    <path d="M 12 50 Q 30 32 48 50 L 48 60 L 12 60 Z" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
    <text x="30" y="80" text-anchor="middle" font-size="12" fill="#0f172a" font-weight="600">Technician / Supervisor</text>
  </g>

  <line x1="500" y1="178" x2="500" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="197" font-size="11" fill="#475569" font-weight="500">HTTPS</text>

  <!-- ===== CLIENT TIER ===== -->
  <rect x="160" y="215" width="680" height="112" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="240" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="1">CLIENT TIER</text>
  <text x="500" y="265" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a8a">Frontend SPA</text>
  <text x="500" y="287" text-anchor="middle" font-size="13" fill="#1e3a8a">React 18 · TypeScript 5 · Vite 5 · TailwindCSS 3</text>
  <text x="500" y="307" text-anchor="middle" font-size="12" fill="#1e3a8a">React Router · TanStack Query · Axios (JWT interceptor) · React Hook Form + Zod</text>

  <line x1="500" y1="332" x2="500" y2="368" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="354" font-size="11" fill="#475569" font-weight="500">REST · JSON · Bearer JWT (TTL 30 min)</text>

  <!-- ===== APPLICATION TIER ===== -->
  <!-- Backend box -->
  <rect x="80" y="375" width="540" height="195" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="100" y="400" font-size="11" font-weight="700" fill="#14532d" letter-spacing="1">APPLICATION TIER</text>
  <text x="350" y="425" text-anchor="middle" font-size="17" font-weight="700" fill="#14532d">Backend API</text>
  <text x="350" y="445" text-anchor="middle" font-size="13" fill="#14532d">Python 3.11 · Django 5 · Django REST Framework</text>

  <!-- CSR layer mini-boxes -->
  <rect x="100" y="465" width="156" height="44" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="178" y="484" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Controllers</text>
  <text x="178" y="500" text-anchor="middle" font-size="10" fill="#15803d">DRF Views · HTTP only</text>

  <rect x="272" y="465" width="156" height="44" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="484" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Services</text>
  <text x="350" y="500" text-anchor="middle" font-size="10" fill="#15803d">Business logic</text>

  <rect x="444" y="465" width="156" height="44" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="522" y="484" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Repositories</text>
  <text x="522" y="500" text-anchor="middle" font-size="10" fill="#15803d">ORM access</text>

  <text x="350" y="540" text-anchor="middle" font-size="12" fill="#14532d" font-weight="600">JWT (SimpleJWT) · bcrypt (cost ≥ 12) · RBAC permissions</text>
  <text x="350" y="558" text-anchor="middle" font-size="11" fill="#14532d" font-style="italic">@transaction.atomic · drf-spectacular OpenAPI</text>

  <!-- Async box -->
  <rect x="660" y="375" width="260" height="195" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="680" y="400" font-size="11" font-weight="700" fill="#4c1d95" letter-spacing="1">ASYNC LAYER</text>
  <text x="790" y="425" text-anchor="middle" font-size="17" font-weight="700" fill="#4c1d95">Scheduler &amp; Workers</text>

  <rect x="680" y="445" width="220" height="44" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="790" y="464" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">Celery Worker</text>
  <text x="790" y="480" text-anchor="middle" font-size="10" fill="#6d28d9">Background tasks</text>

  <rect x="680" y="500" width="220" height="44" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="790" y="519" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">Celery Beat</text>
  <text x="790" y="535" text-anchor="middle" font-size="10" fill="#6d28d9">Periodic scheduler</text>

  <text x="790" y="560" text-anchor="middle" font-size="11" fill="#4c1d95" font-style="italic">Recurring work orders (REQ-03)</text>

  <!-- Connection backend <-> async (dashed) -->
  <line x1="620" y1="475" x2="660" y2="475" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowDashed)"/>

  <!-- Arrows to Data Tier -->
  <line x1="300" y1="575" x2="270" y2="615" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="186" y="600" font-size="10" fill="#475569" font-weight="500">ORM · mysqlclient</text>

  <line x1="790" y1="575" x2="730" y2="615" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="745" y="600" font-size="10" fill="#475569" font-weight="500">Broker</text>

  <!-- ===== DATA TIER ===== -->
  <rect x="100" y="620" width="380" height="115" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="120" y="645" font-size="11" font-weight="700" fill="#7c2d12" letter-spacing="1">DATA TIER</text>
  <text x="290" y="668" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">MySQL 8.0 (InnoDB)</text>
  <text x="290" y="688" text-anchor="middle" font-size="11" fill="#7c2d12">ACID transactions · ≥10 years history (REQ-06)</text>
  <text x="290" y="706" text-anchor="middle" font-size="11" fill="#7c2d12">Equipment · WorkOrder · User · SparePart</text>
  <text x="290" y="724" text-anchor="middle" font-size="11" fill="#7c2d12">AuditLog (append-only · ≥5y retention · REQ-13)</text>

  <rect x="540" y="620" width="380" height="115" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="730" y="668" text-anchor="middle" font-size="16" font-weight="700" fill="#7c2d12">Redis 7</text>
  <text x="730" y="690" text-anchor="middle" font-size="11" fill="#7c2d12">Message broker for Celery</text>
  <text x="730" y="708" text-anchor="middle" font-size="11" fill="#7c2d12">Optional: API response cache</text>
  <text x="730" y="724" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">Replaceable with django-q2 if Redis is undesired</text>
</svg>
